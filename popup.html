<body>

<!-- Trigger Button -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#influencerForm">
  Become an Influencer
</button>

<!-- Modal -->
<div class="modal fade" id="influencerForm" tabindex="-1" aria-labelledby="influencerFormLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-3 shadow-lg overflow-hidden">
      <div class="row g-0">
        
        <!-- Left Image -->
        <div class="col-md-5 d-none d-md-block">
          <img src="https://picsum.photos/500/600" alt="Influencer" class="img-fluid h-100 w-100" style="object-fit: cover;">
        </div>

        <!-- Right Form -->
        <div class="col-md-7 bg-white">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold" id="influencerFormLabel">Join as an Influencer</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body p-4">
            <form action="submit_form.php" method="post">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Contact No</label>
                <input type="text" name="contact" class="form-control" placeholder="Enter your phone number" required>
              </div>

             <div class="mb-3">
                <label class="form-label">Whatsapp No</label>
                <input type="text" name="Whatsapp" class="form-control" placeholder="Enter your phone number" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="3" placeholder="Write here..." required></textarea>
              </div>

              <button type="submit" class="btn btn-success w-100">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
